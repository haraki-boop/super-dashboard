<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logistics Intel - Pro Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0b0f19;
            --card: #161b2a;
            --primary: #3b82f6;
            --accent: #f43f5e;
            --text: #f8fafc;
            --sub-text: #94a3b8;
        }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 24px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* ヘッダー */
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .logo { font-size: 1.5rem; font-weight: 800; letter-spacing: -1px; color: var(--primary); }
        .status { font-size: 0.8rem; background: #064e3b; color: #34d399; padding: 4px 12px; border-radius: 20px; }

        /* 入力エリア */
        .input-card {
            background: var(--card);
            padding: 20px;
            border-radius: 16px;
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            border: 1px solid #2d3748;
        }
        input {
            flex-grow: 1;
            background: #0b0f19;
            border: 1px solid #2d3748;
            color: white;
            padding: 12px;
            border-radius: 10px;
        }
        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4); }

        /* グラフ */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(500px, 1fr)); gap: 24px; margin-bottom: 30px; }
        .card { background: var(--card); padding: 24px; border-radius: 16px; border: 1px solid #2d3748; }
        .card h3 { font-size: 0.9rem; color: var(--sub-text); margin-bottom: 20px; }
        .chart-box { height: 350px; }

        /* AI診断レポート */
        .report-card { background: var(--card); border-radius: 16px; border-left: 6px solid var(--primary); overflow: hidden; }
        .report-header { background: #1e293b; padding: 15px 24px; font-weight: bold; }
        .report-body { padding: 24px; line-height: 1.8; font-size: 1.05rem; white-space: pre-wrap; }
        strong { color: #60a5fa; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo">LOGISTICS INTEL</div>
        <div class="status">AI ANALYSIS ACTIVE</div>
    </header>

    <div class="input-card">
        <input type="text" id="csvUrl" placeholder="CSV URLを入力してください (pub?output=csv)">
        <button onclick="runProAnalysis()">分析実行</button>
    </div>

    <div class="grid">
        <div class="card">
            <h3>📦 入出荷バランス推移</h3>
            <div class="chart-box"><canvas id="lineChart"></canvas></div>
        </div>
        <div class="card">
            <h3>👥 拠点別・生産性分析</h3>
            <div class="chart-box"><canvas id="barChart"></canvas></div>
        </div>
    </div>

    <div class="report-card">
        <div class="report-header">🧠 AI センター長：現場診断・異常検知レポート</div>
        <div id="aiOutput" class="report-body">スプレッドシートのURLを入力して「分析実行」を押すと、ここにAIの指示が表示されます。</div>
    </div>
</div>

<script>
    let charts = {};

    async function runProAnalysis() {
        const url = document.getElementById('csvUrl').value;
        const output = document.getElementById('aiOutput');
        if (!url) return alert("URLを入力してください");

        output.innerHTML = ">>> データをJSONに変換中... AIが異常をスキャンしています...";

        try {
            const res = await fetch(url);
            const csv = await res.text();
            
            // --- ここでデータを加工（CSV → JSON） ---
            const rows = csv.trim().split('\n').map(r => r.split(','));
            const headers = rows[0];
            const jsonData = rows.slice(1).map(row => {
                let obj = {};
                headers.forEach((h, i) => obj[h.trim()] = row[i]?.trim());
                return obj;
            });

            // グラフデータの準備
            const labels = jsonData.map(d => d["日付"] || d[headers[0]]);
            const inValues = jsonData.map(d => parseFloat(d["入荷"]) || 0);
            const outValues = jsonData.map(d => parseFloat(d["出荷"]) || 0);
            const prodValues = jsonData.map(d => parseFloat(d["生産性"]) || 0);

            // グラフ描画
            updateChart('lineChart', 'line', labels, [{label:'入荷', data:inValues, borderColor:'#3b82f6'}, {label:'出荷', data:outValues, borderColor:'#f43f5e'}]);
            updateChart('barChart', 'bar', labels, [{label:'生産性(件/h)', data:prodValues, backgroundColor:'#8b5cf6'}]);

            // AI分析リクエスト
            const aiRes = await fetch("/api/generate", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "gpt-4o",
                    messages: [
                        { role: "system", content: "あなたはデータ分析に強い物流センター長です。JSONデータから、入荷超過、出荷遅延、生産性低下などの異常を即座に見抜き、具体的な指示を出してください。" },
                        { role: "user", content: `以下のデータをJSON形式で解析し、異常の有無と改善策を報告せよ：\n${JSON.stringify(jsonData)}` }
                    ]
                })
            });
            const data = await aiRes.json();
            output.innerHTML = data.choices[0].message.content.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

        } catch (e) {
            output.innerText = "❌ エラー: " + e.message;
        }
    }

    function updateChart(id, type, labels, datasets) {
        if (charts[id]) charts[id].destroy();
        const ctx = document.getElementById(id).getContext('2d');
        charts[id] = new Chart(ctx, {
            type: type,
            data: { labels: labels, datasets: datasets.map(ds => ({
                ...ds,
                borderWidth: 3,
                tension: 0.3,
                fill: type === 'line' ? false : true
            }))},
            options: { maintainAspectRatio: false, plugins: { legend: { labels: { color: '#94a3b8' } } },
                scales: { x: { ticks: { color: '#94a3b8' } }, y: { ticks: { color: '#94a3b8' } } }
            }
        });
    }
</script>
</body>
</html>
