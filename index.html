<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Executive Logistics Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --primary: #2563eb; --text: #1e293b; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .full-width { grid-column: span 2; }
        .ai-report { background: #1e293b; color: #f1f5f9; padding: 25px; border-radius: 12px; margin-top: 20px; line-height: 1.8; }
        input { padding: 10px; width: 400px; border: 1px solid #ddd; border-radius: 6px; }
        button { padding: 10px 20px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <h1>経営・労務 統合ダッシュボード <span style="font-size: 0.9rem; font-weight: normal;">(25年-26年)</span></h1>
    <div>
        <input type="text" id="csvUrl" placeholder="CSV URLを入力">
        <button onclick="updateAll()">全データ更新</button>
    </div>
</div>

<div class="grid">
    <div class="card full-width">
        <h3>💰 収支推移（売上・総利益）</h3>
        <div style="height: 300px;"><canvas id="profitChart"></canvas></div>
    </div>

    <div class="card">
        <h3>👷 労務コスト詳細（残業代・タイミー費用）</h3>
        <div style="height: 250px;"><canvas id="laborChart"></canvas></div>
    </div>

    <div class="card">
        <h3>📈 生産性指標（人時売上・労務比率）</h3>
        <div style="height: 250px;"><canvas id="prodChart"></canvas></div>
    </div>
</div>

<div class="ai-report" id="aiReport">
    ここにAIセンター長の詳細な経営診断が表示されます。
</div>

<script>
    let charts = {};

    async function updateAll() {
        const url = document.getElementById('csvUrl').value;
        const reportArea = document.getElementById('aiReport');
        if(!url) return;

        reportArea.innerText = "全26項目をクロス集計中...";

        try {
            const res = await fetch(url);
            const csvText = await res.text();
            const rows = csvText.trim().split('\n').map(r => r.split(','));

            // 画像の並びからデータを自動抽出
            const labels = rows.slice(1).map(r => r[0]); // 月
            const sales = rows.slice(1).map(r => parseFloat(r[1]) || 0); // 売上
            const gross = rows.slice(1).map(r => parseFloat(r[4]) || 0); // 総利益
            const overtime = rows.slice(1).map(r => parseFloat(r[3]) || 0); // 残業代
            const tymee = rows.slice(1).map(r => parseFloat(r[13]) || 0); // タイミー費用
            const prod = rows.slice(1).map(r => parseFloat(r[18]) || 0); // 生産性

            // 各グラフをレンダリング
            renderProfitChart(labels, sales, gross);
            renderLaborChart(labels, overtime, tymee);
            renderProdChart(labels, prod);

            // AIに全項目を渡して、経営的な改善点を答えさせる
            const aiRes = await fetch("/api/generate", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "gpt-4o",
                    messages: [
                        { role: "system", content: "あなたは経営コンサルタント資格を持つ物流センター長です。売上、利益だけでなく、残業代やタイミー費用、人時売上の推移から、経営上の『火種』を見つけて改善策を提案してください。" },
                        { role: "user", content: `25年〜26年の経営データです。分析せよ：\n${csvText}` }
                    ]
                })
            });
            const data = await aiRes.json();
            reportArea.innerHTML = "<h2>📝 センター長 経営判断</h2>" + data.choices[0].message.content.replace(/\n/g, '<br>');

        } catch (e) {
            reportArea.innerText = "エラー: " + e.message;
        }
    }

    function renderProfitChart(labels, sales, gross) {
        if(charts.p) charts.p.destroy();
        charts.p = new Chart(document.getElementById('profitChart'), {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    { label: '売上', data: sales, borderColor: '#2563eb', fill: false },
                    { label: '売上総利益', data: gross, borderColor: '#10b981', fill: true, backgroundColor: 'rgba(16, 185, 129, 0.1)' }
                ]
            }
        });
    }

    function renderLaborChart(labels, ot, tymee) {
        if(charts.l) charts.l.destroy();
        charts.l = new Chart(document.getElementById('laborChart'), {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    { label: '残業代', data: ot, backgroundColor: '#ef4444' },
                    { label: 'タイミー費用', data: tymee, backgroundColor: '#f59e0b' }
                ]
            },
            options: { scales: { y: { stacked: true } } }
        });
    }

    function renderProdChart(labels, prod) {
        if(charts.pr) charts.pr.destroy();
        charts.pr = new Chart(document.getElementById('prodChart'), {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{ label: '人時売上', data: prod, borderColor: '#8b5cf6', tension: 0.4 }]
            }
        });
    }
</script>
</body>
</html>
