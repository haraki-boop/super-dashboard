<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Logistics Dashboard</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-color: #00ff41; /* マトリックス・グリーン */
            --accent-color: #ff0000;
            --box-bg: #1a1a1a;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        h1 {
            font-size: 1.5rem;
            text-align: center;
            border-bottom: 2px solid var(--text-color);
            padding-bottom: 10px;
            text-shadow: 0 0 10px var(--text-color);
        }
        .status-bar {
            background: #222;
            padding: 5px 15px;
            font-size: 0.8rem;
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .url-input-area {
            background: var(--box-bg);
            padding: 20px;
            border: 1px solid var(--text-color);
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            background: #000;
            border: 1px solid var(--text-color);
            color: var(--text-color);
            padding: 12px;
            margin-bottom: 15px;
            box-sizing: border-box;
            font-family: inherit;
        }
        button {
            width: 100%;
            padding: 15px;
            background: var(--text-color);
            color: #000;
            border: none;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 2px;
        }
        button:hover { background: #00cc33; }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        .card {
            background: var(--box-bg);
            border: 1px solid var(--text-color);
            padding: 15px;
            text-align: center;
        }
        .card-label { font-size: 0.7rem; opacity: 0.7; margin-bottom: 5px; }
        .card-value { font-size: 1.8rem; font-weight: bold; }

        .report-area {
            flex-grow: 1;
            margin-top: 20px;
            padding: 20px;
            border: 1px solid var(--text-color);
            background: rgba(0, 255, 65, 0.05);
            overflow-y: auto;
            white-space: pre-wrap;
            line-height: 1.6;
        }
        .loading { animation: pulse 1.5s infinite; color: var(--accent-color); }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<h1>LOGISTICS AI SUPER DASHBOARD</h1>

<div class="status-bar">
    <span>SYSTEM: ACTIVE</span>
    <span id="timestamp"></span>
</div>

<div class="url-input-area">
    <label style="font-size: 0.8rem; display: block; margin-bottom: 10px;">ENTER SPREADSHEET CSV URL:</label>
    <input type="text" id="csvUrl" placeholder="https://docs.google.com/spreadsheets/d/e/.../pub?output=csv">
    <button onclick="analyzeLogistics()">EXECUTE AI ANALYSIS</button>
</div>

<div class="dashboard-grid">
    <div class="card">
        <div class="card-label">DATA ROWS</div>
        <div id="rowCount" class="card-value">--</div>
    </div>
    <div class="card">
        <div class="card-label">ANALYSIS STATUS</div>
        <div id="statusVal" class="card-value" style="font-size: 1rem;">WAITING</div>
    </div>
</div>

<div id="report" class="report-area">AI REPORT WILL APPEAR HERE...</div>

<script>
    document.getElementById('timestamp').innerText = new Date().toLocaleString();

    async function analyzeLogistics() {
        const csvUrl = document.getElementById('csvUrl').value;
        const report = document.getElementById('report');
        const rowCount = document.getElementById('rowCount');
        const statusVal = document.getElementById('statusVal');

        if (!csvUrl) { alert("Please enter a valid CSV URL"); return; }

        report.innerText = ">>> FETCHING DATA FROM CLOUD...";
        report.className = "report-area loading";
        statusVal.innerText = "FETCHING";

        try {
            // 1. CSVデータの取得
            const res = await fetch(csvUrl);
            if (!res.ok) throw new Error("NETWORK ERROR: COULD NOT REACH CSV");
            const csvData = await res.text();
            
            const rows = csvData.trim().split('\n');
            rowCount.innerText = rows.length - 1;
            
            report.innerText = ">>> DATA RECEIVED. AI ANALYSIS IN PROGRESS...";
            statusVal.innerText = "ANALYZING";

            // 2. AI分析リクエスト
            const aiRes = await fetch("/api/generate", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "gpt-4o",
                    messages: [
                        { 
                            role: "system", 
                            content: "あなたは凄腕の物流センター長です。CSVデータを読み取り、現場の進捗、ボトルネック、人員配置、遅延リスクを鋭く分析してください。報告は箇条書きを使い、センター長らしい決断力のある口調で行ってください。" 
                        },
                        { role: "user", content: `以下の実績データを分析せよ：\n\n${csvData}` }
                    ]
                })
            });

            const data = await aiRes.json();
            
            if (data.error) throw new Error(data.error.message);

            report.className = "report-area";
            report.innerText = data.choices[0].message.content;
            statusVal.innerText = "COMPLETE";

        } catch (err) {
            report.className = "report-area";
            report.innerText = "!!! CRITICAL ERROR !!!\n" + err.message;
            statusVal.innerText = "ERROR";
        }
    }
</script>
</body>
</html>
