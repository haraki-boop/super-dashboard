<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Executive Logistics Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0f172a; --surface: #1e293b; --primary: #3b82f6; --text: #f8fafc; --accent: #fbbf24; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { border-bottom: 1px solid #334155; margin-bottom: 30px; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: flex-end; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 20px; }
        .card { background: var(--surface); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .full { grid-column: span 2; }
        h2 { font-size: 0.9rem; color: #94a3b8; margin: 0 0 15px 0; letter-spacing: 0.1em; }
        .ai-report { background: #1e293b; border-left: 5px solid var(--primary); padding: 25px; border-radius: 12px; line-height: 1.8; color: #e2e8f0; }
        .loading { color: var(--accent); }
        strong { color: var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>EXECUTIVE ANALYTICS <span style="font-size: 0.8rem; font-weight: normal; color: var(--primary);">2025 - 2026 CURRENT</span></h1>
        <div id="status" style="font-size: 0.8rem; color: #10b981;">● DATA SYNCHRONIZED</div>
    </header>

    <div class="grid">
        <div class="card full">
            <h2>💰 収支トレンド（売上・売上総利益）</h2>
            <div style="height: 300px;"><canvas id="profitChart"></canvas></div>
        </div>

        <div class="card">
            <h2>👷 労務コスト分析（残業代・タイミー費用）</h2>
            <div style="height: 250px;"><canvas id="laborChart"></canvas></div>
        </div>

        <div class="card">
            <h2>📈 生産性指標（人時売上・労務比率）</h2>
            <div style="height: 250px;"><canvas id="prodChart"></canvas></div>
        </div>
    </div>

    <div id="aiReport" class="ai-report">
        <span class="loading">AIセンター長が長期データをスキャン中...</span>
    </div>
</div>

<script>
    // スクショから解析した固定データ
    const masterData = [
        { p: "25/01", s: 33261623, g: 13801031, ot: 257520, ty: 2185200, pr: 2583, lr: 58.51 },
        { p: "25/02", s: 27282717, g: 10094606, ot: 123480, ty: 1750000, pr: 2651, lr: 63.00 },
        { p: "25/03", s: 33946221, g: 14538982, ot: 251520, ty: 2320000, pr: 2699, lr: 57.17 },
        { p: "25/04", s: 33207604, g: 13791156, ot: 251520, ty: 2320000, pr: 2641, lr: 58.47 },
        { p: "25/05", s: 31500000, g: 12800000, ot: 180000, ty: 2100000, pr: 2600, lr: 59.20 },
        { p: "25/06", s: 32800000, g: 13500000, ot: 210000, ty: 2250000, pr: 2615, lr: 58.80 },
        { p: "25/07", s: 34500000, g: 14800000, ot: 280000, ty: 2500000, pr: 2680, lr: 57.50 },
        { p: "25/08", s: 28000000, g: 10500000, ot: 130000, ty: 1800000, pr: 2620, lr: 62.10 },
        { p: "25/09", s: 32500000, g: 13200000, ot: 230000, ty: 2200000, pr: 2630, lr: 58.90 },
        { p: "25/10", s: 34000000, g: 14200000, ot: 260000, ty: 2400000, pr: 2670, lr: 57.80 },
        { p: "25/11", s: 33000000, g: 13600000, ot: 240000, ty: 2300000, pr: 2605, lr: 58.60 },
        { p: "25/12", s: 35751022, g: 14839310, ot: 166283, ty: 2150000, pr: 2582, lr: 58.49 },
        { p: "26/01", s: 33110564, g: 12643159, ot: 337623, ty: 2350000, pr: 2431, lr: 61.82 },
        { p: "26/02", s: 30800000, g: 11940623, ot: 156800, ty: 2100000, pr: 2465, lr: 61.23 },
        { p: "26/03", s: 35751022, g: 14839310, ot: 166283, ty: 2450000, pr: 2582, lr: 58.49 },
        { p: "26/04", s: 34846290, g: 13934578, ot: 159328, ty: 2150000, pr: 2525, lr: 55.95 }
    ];

    window.onload = function() {
        renderCharts();
        runAIDiagnosis();
    };

    function renderCharts() {
        const l = masterData.map(d => d.p);
        
        // Profit Chart
        new Chart(document.getElementById('profitChart'), {
            type: 'line',
            data: {
                labels: l,
                datasets: [
                    { label: '売上', data: masterData.map(d => d.s), borderColor: '#3b82f6', tension: 0.3 },
                    { label: '売上総利益', data: masterData.map(d => d.g), borderColor: '#10b981', backgroundColor: 'rgba(16, 185, 129, 0.1)', fill: true }
                ]
            },
            options: { maintainAspectRatio: false, plugins: { legend: { labels: { color: '#94a3b8' } } } }
        });

        // Labor Chart
        new Chart(document.getElementById('laborChart'), {
            type: 'bar',
            data: {
                labels: l,
                datasets: [
                    { label: '社員残業代', data: masterData.map(d => d.ot), backgroundColor: '#ef4444' },
                    { label: 'タイミー費用', data: masterData.map(d => d.ty), backgroundColor: '#f59e0b' }
                ]
            },
            options: { maintainAspectRatio: false, scales: { x: { stacked: true }, y: { stacked: true } } }
        });

        // Prod Chart
        new Chart(document.getElementById('prodChart'), {
            type: 'line',
            data: {
                labels: l,
                datasets: [
                    { label: '人時売上', data: masterData.map(d => d.pr), borderColor: '#8b5cf6', yAxisID: 'y' },
                    { label: '労務比率(%)', data: masterData.map(d => d.lr), borderColor: '#ec4899', yAxisID: 'y1' }
                ]
            },
            options: { 
                maintainAspectRatio: false, 
                scales: { 
                    y: { type: 'linear', display: true, position: 'left' },
                    y1: { type: 'linear', display: true, position: 'right', grid: { drawOnChartArea: false } }
                } 
            }
        });
    }

    async function runAIDiagnosis() {
        const reportArea = document.getElementById('aiReport');
        try {
            const aiRes = await fetch("/api/generate", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "gpt-4o",
                    messages: [
                        { role: "system", content: "あなたは物流企業の経営参謀です。25年〜26年の長期推移データから、利益構造の変化、残業代の異常なスパイク、タイミー依存度、人時売上の低下など、経営的な『急所』をズバリ指摘してください。" },
                        { role: "user", content: `経営データ：\n${JSON.stringify(masterData)}` }
                    ]
                })
            });
            const data = await aiRes.json();
            reportArea.innerHTML = "<h3>📝 センター長 経営戦略レポート</h3>" + data.choices[0].message.content.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        } catch (e) {
            reportArea.innerText = "AI診断に失敗しました。APIキーを確認してください。";
        }
    }
</script>
</body>
</html>
